# Northstar — infrastructure (postgres). Runs on the same VPS as zero-mail,
# sharing its nginx-proxy-manager edge but nothing else: own networks, own
# volume, own loopback port.
#
#   docker compose \
#     -f docker/docker-compose.infra.yml \
#     -f docker/docker-compose.yml \
#     --env-file .env up -d
#
# One-time server bootstrap (see docs/ops/DEPLOY.md):
#   docker network create northstar-proxy
#   docker network create northstar-internal
#   docker network connect northstar-proxy nginx-proxy-manager
name: northstar

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
    compress: "true"

services:
  postgres:
    # pgvector build of Postgres 18 — semantic search lands without a
    # migration of the database image.
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg18}
    container_name: northstar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-northstar}
      POSTGRES_USER: ${POSTGRES_USER:-northstar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in the server .env}
    # Loopback-only publish for ad-hoc SSH-tunnel access from a dev machine
    # (zero-mail owns 5555 on this box; northstar takes 5556):
    #   ssh -fN -L 5556:localhost:5556 <user>@<vps>
    ports:
      - "127.0.0.1:5556:5432"
    volumes:
      # PG18+ images want the mount at /var/lib/postgresql (data in a subdir)
      # so future major upgrades can use pg_upgrade --link.
      - postgres_data:/var/lib/postgresql
    networks:
      - northstar-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

networks:
  northstar-proxy:
    external: true
  northstar-internal:
    external: true

volumes:
  postgres_data:
    # Pinned so moving/renaming compose files never orphans the data.
    name: ${POSTGRES_VOLUME_NAME:-northstar_postgres_data}
