# Northstar — infrastructure (networks only).
#
# Northstar does NOT run its own Postgres: it shares the zero-mail Postgres
# instance (pgvector build) on this VPS, using a dedicated `northstar` database
# + role. That container joins `northstar-internal` (declared in zero-mail's
# infra compose) so northstar api/mcp reach it as host `zeromail-postgres`.
#
#   docker compose \
#     -f docker/docker-compose.infra.yml \
#     -f docker/docker-compose.yml \
#     --env-file .env up -d
#
# One-time server bootstrap (see docs/ops/DEPLOY.md):
#   docker network create northstar-proxy
#   docker network create northstar-internal
#   docker network connect northstar-proxy nginx-proxy-manager
#   # shared DB: create role+db+extensions in zeromail-postgres, and ensure it
#   # is attached to northstar-internal (persisted via zero-mail's compose).
name: northstar

# This file intentionally declares no services — it exists so the external
# networks resolve for the -f infra -f app compose invocation used everywhere
# (deploy workflow, docs). The shared Postgres lives in zero-mail's compose.
networks:
  northstar-proxy:
    external: true
  northstar-internal:
    external: true
