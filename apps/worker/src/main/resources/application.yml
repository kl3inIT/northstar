spring:
  application:
    name: northstar-worker
  config:
    # Optional local .env (gitignored) so OPENAI_API_KEY resolves for a local
    # bootRun; in the container it arrives as an env var (compose env_file).
    import: optional:file:.env[.properties],optional:file:../../.env[.properties]
  main:
    # No web server; run as a background process.
    web-application-type: none
    # With virtual threads enabled the @Scheduled/@Async executors are daemon
    # threads, so a headless (non-web) context has nothing to keep the JVM
    # alive and exits right after startup — Docker then crash-loops it. This
    # registers a single non-daemon thread that parks until shutdown.
    keep-alive: true
  threads:
    virtual:
      # @Scheduled + event listeners run on virtual threads — cheap to block on
      # LLM-latency jobs.
      enabled: true
  datasource:
    url: ${NORTHSTAR_DB_URL:jdbc:postgresql://localhost:5432/northstar}
    username: ${NORTHSTAR_DB_USER:northstar}
    password: ${NORTHSTAR_DB_PASSWORD:northstar}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: false
  ai:
    # The worker is the indexer: it embeds notes/files and captions images. Same
    # OpenAI + pgvector config as the api (which keeps its own copy only to embed
    # search QUERIES), so both write/read vectors of identical shape.
    openai:
      api-key: ${OPENAI_API_KEY}
      timeout: 60s
      max-retries: 2
      chat:
        # Vision captions for image attachments (reasoning model, no temperature).
        model: ${NORTHSTAR_CAPTURE_MODEL:gpt-5.5}
      embedding:
        options:
          model: text-embedding-3-large
          dimensions: 1536
    vectorstore:
      pgvector:
        # Flyway (api, V14) owns the schema — never initialize it here.
        initialize-schema: false
        dimensions: 1536
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: false
      # Pinned false (the default) as an invariant: the worker shares the api's
      # event_publication table but lacks the api's AI beans (vector store,
      # chat model), so replaying the api's incomplete backlog here would
      # complete those publications as no-ops — a note would silently never be
      # embedded. Only the api republishes its own backlog.
      republish-outstanding-events-on-restart: false

db-scheduler:
  polling-interval: 5s
  heartbeat-interval: 30s
  missed-heartbeats-limit: 4
  threads: 4
  delay-startup-until-context-ready: true
  shutdown-max-wait: 2m

northstar:
  ai:
    active-gateway: ${NORTHSTAR_AI_GATEWAY:openai}
    gateways:
      openai:
        type: OPENAI_COMPATIBLE
        display-name: OpenAI
        base-url: https://api.openai.com/v1
        api-key: ${OPENAI_API_KEY:}
        models:
          - ${NORTHSTAR_ASSISTANT_MODEL:gpt-5.5}
          - ${NORTHSTAR_CAPTURE_MODEL:gpt-5.5}
          - ${NORTHSTAR_GRADER_MODEL:gpt-5.5}
        discover-models: false
        timeout: 60s
      nine-router:
        type: OPENAI_COMPATIBLE
        display-name: 9Router
        base-url: ${NINEROUTER_URL:}
        api-key: ${NINEROUTER_KEY:}
        models: []
        discover-models: true
        timeout: 60s
    routes:
      assistant: ${NORTHSTAR_ASSISTANT_MODEL:gpt-5.5}
      capture: ${NORTHSTAR_CAPTURE_MODEL:gpt-5.5}
      alignment: ${NORTHSTAR_ALIGNMENT_MODEL:gpt-5.5}
      title: ${NORTHSTAR_TITLE_MODEL:gpt-5.5}
      study-grader: ${NORTHSTAR_GRADER_MODEL:gpt-5.5}
      image-caption: ${NORTHSTAR_IMAGE_CAPTION_MODEL:gpt-5.5}
    catalog:
      cache-ttl: 5m
  brief:
    github:
      # Optional. Public releases work anonymously (60 requests/hour); a token
      # raises the GitHub REST allowance for larger custom source lists.
      token: ${GITHUB_TOKEN:}
    firecrawl:
      # Search requires a server-side key. Without it, the remaining public
      # sources still produce a useful partial brief.
      base-url: https://api.firecrawl.dev
      api-key: ${FIRECRAWL_API_KEY:}
      request-timeout: 30s
  web:
    enabled: ${NORTHSTAR_WEB_ENABLED:true}
    default-search-provider: ${NORTHSTAR_WEB_SEARCH_PROVIDER:openai}
    default-page-reader: ${NORTHSTAR_WEB_PAGE_READER:direct}
    fallback-enabled: false
    search-fallback-order: []
    page-reader-fallback-order: []
    cache-ttl: 15m
    cache-max-size: 200
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${NORTHSTAR_WEB_MODEL:gpt-5.5}
      search-context-size: medium
      connect-timeout: 5s
      request-timeout: 60s
