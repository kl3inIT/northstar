northstar:
  auth:
    enabled: false
    web-session:
      cookie-max-age: 30d
      http-only: true
      same-site: Lax
      secure: false

spring:
  datasource:
    hikari:
      # Testcontainers stops after the test class. Keeping no warm idle
      # connection avoids Hikari refill attempts against a just-stopped mapped
      # port during teardown.
      minimum-idle: 0
      maximum-pool-size: 3
      connection-timeout: 2000
  session:
    timeout: 30d
    jdbc:
      initialize-schema: never
