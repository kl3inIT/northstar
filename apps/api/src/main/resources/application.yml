spring:
  application:
    name: northstar-api
  config:
    # Load repo-root .env (gitignored) as properties so OPENAI_API_KEY resolves
    # without a shell env var. Both paths because the working dir differs between
    # `./gradlew :apps:api:bootRun` (apps/api) and IDE run configs (repo root).
    import: optional:file:.env[.properties],optional:file:../../.env[.properties]
  threads:
    virtual:
      # Java 25 virtual threads for request handling — blocking LLM/DB calls park
      # the virtual thread instead of pinning a platform thread.
      enabled: true
  datasource:
    url: ${NORTHSTAR_DB_URL:jdbc:postgresql://localhost:5432/northstar}
    username: ${NORTHSTAR_DB_USER:northstar}
    password: ${NORTHSTAR_DB_PASSWORD:northstar}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    # Migrations ship on the classpath from :core (core/src/main/resources/db/migration).
    locations: classpath:db/migration
    # The shared zeromail-postgres is an EXTERNAL container — compose cannot
    # depends_on it, so after a VPS reboot the api may start before the DB
    # accepts connections. Retry the first connection (≈150s) instead of
    # failing fast and crash-looping the site into 502s until the race is won.
    connect-retries: 30
    connect-retries-interval: 5s
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      # Interactive calls (capture, alignment, transcribe) run on the request
      # thread — bound the wait and retry transient failures instead of hanging.
      timeout: 60s
      max-retries: 2
      # Spring AI 2.0 dropped the `.options` layer (chat.options.model -> chat.model).
      # No temperature: gpt-5.5 is a reasoning model and rejects any value but 1.
      chat:
        model: ${NORTHSTAR_CAPTURE_MODEL:gpt-5.5}
      # Embedding config KEPT the `.options` nesting (unlike chat above — verified
      # in OpenAiEmbeddingProperties). 3-large shortened to 1536 dims (Matryoshka):
      # best multilingual quality (Vietnamese notes) at a pgvector-indexable width.
      embedding:
        options:
          model: text-embedding-3-large
          dimensions: 1536
    vectorstore:
      pgvector:
        # Flyway owns the schema (V14) — HNSW + cosine are the defaults.
        initialize-schema: false
        dimensions: 1536
    chat:
      memory:
        repository:
          jdbc:
            # Flyway owns the schema (V12) — never let the repository DDL race it.
            initialize-schema: never
  modulith:
    events:
      jdbc:
        schema-initialization:
          # Flyway owns event_publication (V15).
          enabled: false
      # An embedding job interrupted by a crash/redeploy replays at next start
      # instead of being lost (the startup backfill is the belt to this brace).
      republish-outstanding-events-on-restart: true
      # Completed publications are deleted, not kept — nothing reads the history
      # and the outbox table stays lean.
      completion-mode: delete
  servlet:
    multipart:
      # Voice capture uploads; Whisper's own cap is 25MB.
      max-file-size: 25MB
      max-request-size: 26MB

  mvc:
    problemdetails:
      # Framework-raised errors (unknown path, 405, unreadable body) come back as
      # RFC 9457 ProblemDetail too — one error shape everywhere.
      enabled: true

# Assistant conversation auto-titling (background, best-effort). Point `model` at a
# cheaper tier (e.g. a mini/nano model) to cut titling cost — no code change; set
# `enabled: false` to switch titling off (the list falls back to the first message).
northstar:
  auth:
    enabled: ${NORTHSTAR_AUTH_ENABLED:true}
    username: ${NORTHSTAR_AUTH_USERNAME:}
    password-hash: ${NORTHSTAR_AUTH_PASSWORD_HASH:}
    mobile:
      enabled: ${NORTHSTAR_MOBILE_AUTH_ENABLED:false}
      issuer: ${NORTHSTAR_MOBILE_AUTH_ISSUER:northstar-api}
      audience: ${NORTHSTAR_MOBILE_AUTH_AUDIENCE:northstar-mobile}
      jwt-secret: ${NORTHSTAR_MOBILE_AUTH_JWT_SECRET:}
      access-ttl: ${NORTHSTAR_MOBILE_AUTH_ACCESS_TTL:15m}
      refresh-ttl: ${NORTHSTAR_MOBILE_AUTH_REFRESH_TTL:30d}
  security:
    cors:
      # Browser-only allowlist. Native clients do not use CORS. Keep empty when
      # the web UI and API share an origin; otherwise use exact comma-separated
      # origins (scheme + host + optional port, without paths or wildcards).
      allowed-origins: ${NORTHSTAR_CORS_ALLOWED_ORIGINS:}
  assistant:
    title:
      enabled: true
      model: ${NORTHSTAR_TITLE_MODEL:gpt-5.5}
  web:
    enabled: ${NORTHSTAR_WEB_ENABLED:true}
    default-search-provider: ${NORTHSTAR_WEB_SEARCH_PROVIDER:openai}
    default-page-reader: ${NORTHSTAR_WEB_PAGE_READER:direct}
    fallback-enabled: false
    search-fallback-order: []
    page-reader-fallback-order: []
    cache-ttl: 15m
    cache-max-size: 200
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${NORTHSTAR_WEB_MODEL:gpt-5.5}
      search-context-size: medium
      connect-timeout: 5s
      request-timeout: 60s
    direct:
      max-bytes: 2097152
      max-characters: 40000
      max-redirects: 4
      connect-timeout: 5s
      request-timeout: 10s

server:
  port: ${NORTHSTAR_API_PORT:8888}
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax
        secure: ${NORTHSTAR_COOKIE_SECURE:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,modulith

logging:
  level:
    # Full LLM request/response bodies from the SimpleLoggerAdvisor in AiConfig.
    # DEBUG in dev; drop to INFO to silence.
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: DEBUG
