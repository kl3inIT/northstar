spring:
  application:
    name: northstar-api
  threads:
    virtual:
      # Java 25 virtual threads for request handling — blocking LLM/DB calls park
      # the virtual thread instead of pinning a platform thread.
      enabled: true
  datasource:
    url: ${NORTHSTAR_DB_URL:jdbc:postgresql://localhost:5432/northstar}
    username: ${NORTHSTAR_DB_USER:northstar}
    password: ${NORTHSTAR_DB_PASSWORD:northstar}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    # Migrations ship on the classpath from :core (core/src/main/resources/db/migration).
    locations: classpath:db/migration
  ai:
    vectorstore:
      pgvector:
        # Flyway owns the schema (V14) — HNSW + cosine are the defaults.
        initialize-schema: false
        dimensions: 1536
    chat:
      memory:
        repository:
          jdbc:
            # Flyway owns the schema (V12) — never let the repository DDL race it.
            initialize-schema: never
  modulith:
    events:
      jdbc:
        schema-initialization:
          # Flyway owns event_publication (V15).
          enabled: false
      # An embedding job interrupted by a crash/redeploy replays at next start
      # instead of being lost (the startup backfill is the belt to this brace).
      republish-outstanding-events-on-restart: true
      # Completed publications are deleted, not kept — nothing reads the history
      # and the outbox table stays lean.
      completion-mode: delete
  session:
    timeout: ${NORTHSTAR_WEB_SESSION_TIMEOUT:30d}
    jdbc:
      # Flyway owns the schema (V41); sessions must survive API restarts.
      initialize-schema: never
  servlet:
    multipart:
      # Voice capture uploads; Whisper's own cap is 25MB.
      max-file-size: 25MB
      max-request-size: 26MB

  mvc:
    problemdetails:
      # Framework-raised errors (unknown path, 405, unreadable body) come back as
      # RFC 9457 ProblemDetail too — one error shape everywhere.
      enabled: true

# Assistant conversation auto-titling (background, best-effort). Point `model` at a
# cheaper tier (e.g. a mini/nano model) to cut titling cost — no code change; set
# `enabled: false` to switch titling off (the list falls back to the first message).
northstar:
  ai:
    active-gateway: ${NORTHSTAR_AI_GATEWAY:openai}
    gateways:
      openai:
        type: OPENAI
        display-name: OpenAI
        base-url: https://api.openai.com/v1
        api-key: ${OPENAI_API_KEY:}
        models:
          - ${NORTHSTAR_ASSISTANT_MODEL:gpt-5.6-luna}
          - ${NORTHSTAR_CAPTURE_MODEL:gpt-5.6-luna}
          - ${NORTHSTAR_ALIGNMENT_MODEL:gpt-5.6-luna}
          - ${NORTHSTAR_TITLE_MODEL:gpt-4o-mini}
          - ${NORTHSTAR_GRADER_MODEL:gpt-5.6-sol}
          - ${NORTHSTAR_IMAGE_CAPTION_MODEL:gpt-4o-mini}
        discover-models: false
        timeout: 60s
    routes:
      assistant: ${NORTHSTAR_ASSISTANT_MODEL:gpt-5.6-luna}
      capture: ${NORTHSTAR_CAPTURE_MODEL:gpt-5.6-luna}
      alignment: ${NORTHSTAR_ALIGNMENT_MODEL:gpt-5.6-luna}
      title: ${NORTHSTAR_TITLE_MODEL:gpt-4o-mini}
      study-grader: ${NORTHSTAR_GRADER_MODEL:gpt-5.6-sol}
      image-caption: ${NORTHSTAR_IMAGE_CAPTION_MODEL:gpt-4o-mini}
      text-to-speech: ${NORTHSTAR_TTS_TARGET:openai/tts-1-hd/alloy}
      speech-to-text: ${NORTHSTAR_STT_TARGET:gpt-4o-mini-transcribe}
      realtime-transcription: ${NORTHSTAR_REALTIME_STT_MODEL:gpt-realtime-whisper}
      image-generation: ${NORTHSTAR_IMAGE_TARGET:gpt-image-2}
      embedding: ${NORTHSTAR_EMBEDDING_TARGET:text-embedding-3-large}
    catalog:
      cache-ttl: 5m
    credentials:
      encryption-key-base64: ${NORTHSTAR_AI_CREDENTIAL_KEY:}
  speech:
    provider: ${NORTHSTAR_SPEECH_PROVIDER:azure}
    azure:
      key: ${AZURE_SPEECH_KEY:}
      region: ${AZURE_SPEECH_REGION:}
  briefs:
    huggingnews:
      base-url: https://huggingnews.com
      connect-timeout: 5s
      request-timeout: 15s
      feed-cache-ttl: 5m
      detail-cache-ttl: 30m
  auth:
    enabled: ${NORTHSTAR_AUTH_ENABLED:true}
    username: ${NORTHSTAR_AUTH_USERNAME:}
    password-hash: ${NORTHSTAR_AUTH_PASSWORD_HASH:}
    web-session:
      cookie-max-age: ${NORTHSTAR_WEB_SESSION_TIMEOUT:30d}
      http-only: true
      same-site: Lax
      secure: ${NORTHSTAR_COOKIE_SECURE:true}
    mobile:
      enabled: ${NORTHSTAR_MOBILE_AUTH_ENABLED:false}
      issuer: ${NORTHSTAR_MOBILE_AUTH_ISSUER:northstar-api}
      audience: ${NORTHSTAR_MOBILE_AUTH_AUDIENCE:northstar-mobile}
      jwt-secret: ${NORTHSTAR_MOBILE_AUTH_JWT_SECRET:}
      access-ttl: ${NORTHSTAR_MOBILE_AUTH_ACCESS_TTL:15m}
      refresh-ttl: ${NORTHSTAR_MOBILE_AUTH_REFRESH_TTL:30d}
  security:
    cors:
      # Browser-only allowlist. Native clients do not use CORS. Keep empty when
      # the web UI and API share an origin; otherwise use exact comma-separated
      # origins (scheme + host + optional port, without paths or wildcards).
      allowed-origins: ${NORTHSTAR_CORS_ALLOWED_ORIGINS:}
  assistant:
    title:
      enabled: true
  web:
    enabled: ${NORTHSTAR_WEB_ENABLED:true}
    default-search-provider: ${NORTHSTAR_WEB_SEARCH_PROVIDER:openai}
    default-search-gateway: ${NORTHSTAR_WEB_SEARCH_GATEWAY:openai}
    default-search-target: ${NORTHSTAR_WEB_SEARCH_TARGET:gpt-5.6-luna}
    default-page-reader: ${NORTHSTAR_WEB_PAGE_READER:direct}
    fallback-enabled: false
    search-fallback-order: []
    page-reader-fallback-order: [firecrawl]
    cache-ttl: 15m
    cache-max-size: 200
    openai:
      search-context-size: medium
    direct:
      max-bytes: 2097152
      max-characters: 40000
      max-redirects: 4
      connect-timeout: 5s
      request-timeout: 10s
    firecrawl:
      base-url: https://api.firecrawl.dev
      api-key: ${FIRECRAWL_API_KEY:}
      max-response-bytes: 2097152
      max-characters: 40000
      connect-timeout: 5s
      request-timeout: 60s

server:
  port: ${NORTHSTAR_API_PORT:8888}

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    # Prompt and response bodies can contain private user data. Only the local
    # profile opts into this logger.
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: 'OFF'
