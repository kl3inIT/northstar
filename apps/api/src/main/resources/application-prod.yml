spring:
  datasource:
    hikari:
      pool-name: northstar-api
      maximum-pool-size: ${NORTHSTAR_API_DB_POOL_MAX:8}
      minimum-idle: ${NORTHSTAR_API_DB_POOL_MIN:2}
      connection-timeout: ${NORTHSTAR_API_DB_CONNECTION_TIMEOUT_MS:5000}
      validation-timeout: ${NORTHSTAR_API_DB_VALIDATION_TIMEOUT_MS:3000}
  flyway:
    # The shared PostgreSQL container is external to this compose project. On
    # host reboot, wait for it instead of crash-looping before it accepts TCP.
    connect-retries: 30
    connect-retries-interval: 5s
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  forward-headers-strategy: native
  servlet:
    session:
      cookie:
        secure: ${NORTHSTAR_COOKIE_SECURE:true}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        environment: production
    json:
      stacktrace:
        max-length: 32768
        max-throwable-depth: 64
  level:
    root: INFO
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: 'OFF'
