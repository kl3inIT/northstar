spring:
  application:
    name: northstar-mcp
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${NORTHSTAR_DB_URL:jdbc:postgresql://localhost:5432/northstar}
    username: ${NORTHSTAR_DB_USER:northstar}
    password: ${NORTHSTAR_DB_PASSWORD:northstar}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  # The api owns migrations; mcp only reads the already-migrated schema.
  flyway:
    enabled: false
  ai:
    mcp:
      server:
        name: northstar
        version: 0.1.0
        # Streamable-HTTP (SSE is deprecated in Spring AI 2.0): one long-running
        # server on :8081 that every agent session connects to at /mcp.
        protocol: STREAMABLE
        instructions: >-
          Northstar is the user's personal knowledge base (Obsidian-style Markdown
          notes with [[wiki links]]), task manager and calendar, covering IELTS/HSK
          study, scholarship applications, projects and a daily journal. Search notes
          before answering questions about the user's studies, plans or saved
          knowledge; create a note when the user learns something worth keeping;
          create tasks for reminders and todos; check today_tasks to see what the
          user should work on. For scheduling: upcoming_events shows the calendar,
          find_free_slots finds room on a day, create_event books a block — all in
          the user's local wall-clock time.

server:
  port: ${NORTHSTAR_MCP_PORT:8081}
  # Behind NPM: let Tomcat's RemoteIpValve resolve the real client IP from the
  # proxy's forwarded headers (it trusts only private-range proxies — the NPM
  # container — and ignores a client-supplied X-Forwarded-For), so getRemoteAddr()
  # is the true client and the per-IP rate limit can't be spoofed. To lock it
  # down further, pin server.tomcat.remoteip.internal-proxies to the NPM subnet.
  forward-headers-strategy: native

# Abuse guard for the PUBLIC, no-auth MCP endpoint (/mcp). Two-layer request-rate
# limit (global + per client IP, IP taken from X-Forwarded-For behind NPM) plus a
# request-body cap; every call is logged for audit. Defaults mirror jmix-mcp-docs.
# Tune here or set enabled=false to turn it off.
northstar:
  mcp:
    rate-limit:
      enabled: true
      global-capacity: 800
      global-window: 1m
      ip-capacity: 300
      ip-window: 1h
      max-body-bytes: 262144
      max-tracked-ips: 50000
