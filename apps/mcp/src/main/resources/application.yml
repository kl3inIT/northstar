spring:
  application:
    name: northstar-mcp
  datasource:
    url: ${NORTHSTAR_DB_URL:jdbc:postgresql://localhost:5432/northstar}
    username: ${NORTHSTAR_DB_USER:northstar}
    password: ${NORTHSTAR_DB_PASSWORD:northstar}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  # The api owns migrations; mcp only reads the already-migrated schema.
  flyway:
    enabled: false

server:
  port: ${NORTHSTAR_MCP_PORT:8081}
