# Northstar web — static SPA serving. The edge proxy (nginx-proxy-manager on
# the VPS) terminates TLS and routes `/` here and `/api` to northstar-api;
# this server only ever sees plain HTTP on the internal docker network.
#
# NOTE deliberately NO Content-Security-Policy yet: live dictation opens
# wss://api.openai.com from the browser and loads an AudioWorklet — a guessed
# CSP would break it silently. Add one measured from real traffic later.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Container/edge health probe — never hits the filesystem.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Baseline hardening headers (CSP intentionally omitted, see above).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), geolocation=(), payment=()" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Vite emits content-hashed filenames under /assets — cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA history fallback: every route renders index.html (never cached, so
    # a deploy is picked up on the next navigation).
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
