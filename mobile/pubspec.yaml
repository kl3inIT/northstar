name: northstar
description: "The adaptive Flutter client for Northstar."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  cupertino_icons: ^1.0.9
  flutter:
    sdk: flutter
  flutter_chat_core: ^2.9.0
  flutter_chat_ui: ^2.11.1
  flutter_markdown_plus: ^1.0.12
  flutter_secure_storage: ^10.3.1
  go_router: ^17.3.0
  http: ^1.6.0
  http_parser: ^4.1.2
  image_picker: ^1.2.3
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  # Some framework navigation metadata references MaterialIcons even though
  # Northstar's widgets are Cupertino-only. The release build tree-shakes it.
  uses-material-design: true
