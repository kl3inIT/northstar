# Build container images and push to GHCR.
#
# Single-developer simplification of zero-mail's pipeline: no semver release
# train. Every green CI run on main publishes :main + :sha-<short> images, and
# the deploy workflow rolls the VPS onto the immutable :sha-<short> that CI
# actually validated. Rollback safety comes from both manual sha tags and the
# deploy job's image-ID snapshot (zero-mail's .last-deploy.txt pattern).
#
# Gated on CI: this runs only after the "CI" workflow completes successfully on
# main (workflow_run), so a red suite (Modulith verify, integration tests, web
# build via gen:api drift) never produces images — and, since deploy triggers
# off THIS workflow's success, never auto-deploys. build-and-push itself only
# compiles (bootJar -x test); the test gate lives in CI upstream.
name: Build and Push Images

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.component }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only build when CI passed (manual dispatch always proceeds).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            dockerfile: apps/api/Dockerfile
          - component: web
            dockerfile: web/Dockerfile
          - component: mcp
            dockerfile: apps/mcp/Dockerfile
          - component: worker
            dockerfile: apps/worker/Dockerfile

    steps:
      # workflow_run checks out the default branch tip by default; pin the exact
      # commit CI validated so the :sha-<short> tag matches the tested code.
      - uses: actions/checkout@v7.0.1
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: docker/setup-buildx-action@v4.2.0

      - uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image meta
        id: meta
        run: |
          echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "sha=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          # GHCR requires a lowercase repository path; the owner is kl3inIT.
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          # pull:true picks up rolling CVE rebuilds of the base images.
          pull: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/northstar-${{ matrix.component }}:main
            ghcr.io/${{ steps.meta.outputs.owner }}/northstar-${{ matrix.component }}:${{ steps.meta.outputs.sha }}
          # Keep large BuildKit layers in GHCR instead of competing with the
          # repository's 10 GiB GitHub Actions cache budget used by Gradle,
          # Flutter and pnpm. Each component owns one persistent cache tag.
          cache-from: type=registry,ref=ghcr.io/${{ steps.meta.outputs.owner }}/northstar-${{ matrix.component }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.meta.outputs.owner }}/northstar-${{ matrix.component }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.revision }}
