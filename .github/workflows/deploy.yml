# Deploy to the VPS — manual dispatch, runs ON the box.
#
# Straight port of zero-mail's hard-won deploy shape, minus the semver gate
# (single dev -> auto-deploy the exact sha image that passed CI):
#   • self-hosted runner on the VPS: the deploy is a local process, so
#     Hostinger's edge DDoS filter can never drop an inbound SSH session
#   • snapshot the running image IDs BEFORE recreate → auto-rollback on any
#     deploy/smoke failure (stays RED so the failure gets investigated)
#   • pg_dump before `up -d` — the one gap zero-mail documents is that
#     rollback cannot undo a partially-applied forward migration; a fresh
#     dump makes even that recoverable
#   • reload nginx-proxy-manager after recreate: NPM pins upstream container
#     IPs at config load, so a recreated api gets 502'd until a reload
#
# Prerequisites on the VPS (one-time, see docs/ops/DEPLOY.md):
#   /apps/north-star          — clone of this repo (compose files + .env)
#   northstar-proxy/internal — external docker networks, NPM attached
#   a self-hosted runner registered on this repo with labels [self-hosted, northstar]
name: Deploy

on:
  # Auto-CD: after images are built+pushed on a push to main, deploy the
  # immutable sha-<short> tag from that build.
  # (northstar is not strict like zero-mail — no manual gate on every release.)
  workflow_run:
    workflows: ["Build and Push Images"]
    types: [completed]
    branches: [main]
  # Manual dispatch is kept for rollback: deploy a specific sha-<short> tag.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (main, or a sha-<short> for pinpoint rollback)'
        required: false
        default: 'main'
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-northstar
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (self-hosted VPS runner)
    runs-on: [self-hosted, northstar]
    timeout-minutes: 20
    environment: production
    # On workflow_run, only proceed if the build actually succeeded; manual
    # dispatch always proceeds.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy stack
        env:
          DEPLOY_TAG_INPUT: ${{ inputs.tag }}
          BUILD_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          # GHCR paths are lowercase; the repo owner is kl3inIT.
          OWNER="${OWNER,,}"
          if [[ -n "${DEPLOY_TAG_INPUT:-}" ]]; then
            DEPLOY_TAG="$DEPLOY_TAG_INPUT"
          elif [[ -n "${BUILD_HEAD_SHA:-}" ]]; then
            DEPLOY_TAG="sha-${BUILD_HEAD_SHA:0:7}"
          else
            echo "::error::Cannot determine image tag to deploy."
            exit 1
          fi
          echo "Deploying image tag: ${DEPLOY_TAG}"

          cd /apps/north-star
          git fetch --quiet origin main
          DEPLOY_REF="${BUILD_HEAD_SHA:-origin/main}"
          git checkout --quiet "$DEPLOY_REF" -- docker/docker-compose.yml docker/docker-compose.infra.yml

          echo "::group::Backup database before migrate"
          # Northstar shares the zero-mail Postgres instance; dump the dedicated
          # northstar database from that container.
          docker exec zeromail-postgres pg_dump -U northstar -d northstar -Fc \
            > "/apps/north-star/backups/pre-deploy-$(date +%Y%m%d-%H%M%S).dump" \
            || echo "::warning::pg_dump failed (first deploy with no postgres yet is fine)"
          ls -t /apps/north-star/backups/pre-deploy-*.dump 2>/dev/null | tail -n +8 | xargs -r rm --
          echo "::endgroup::"

          echo "::group::Snapshot previous image digests for rollback"
          : > .last-deploy.txt
          for c in northstar-api northstar-web northstar-mcp northstar-worker; do
            docker inspect --format="$c {{index .Image}}" "$c" 2>/dev/null | tee -a .last-deploy.txt || true
          done
          echo "::endgroup::"

          export NORTHSTAR_API_IMAGE="ghcr.io/${OWNER}/northstar-api:${DEPLOY_TAG}"
          export NORTHSTAR_WEB_IMAGE="ghcr.io/${OWNER}/northstar-web:${DEPLOY_TAG}"
          export NORTHSTAR_MCP_IMAGE="ghcr.io/${OWNER}/northstar-mcp:${DEPLOY_TAG}"
          export NORTHSTAR_WORKER_IMAGE="ghcr.io/${OWNER}/northstar-worker:${DEPLOY_TAG}"

          echo "::group::Pull and recreate"
          docker compose -f docker/docker-compose.infra.yml -f docker/docker-compose.yml \
            --env-file .env pull api web worker mcp
          docker compose -f docker/docker-compose.infra.yml -f docker/docker-compose.yml \
            --env-file .env up -d --no-build api web worker mcp
          echo "::endgroup::"

          echo "::group::Wait for api readiness"
          for attempt in {1..60}; do
            if docker exec northstar-api curl -fsS http://localhost:8888/actuator/health >/dev/null 2>&1; then
              echo "api ready"; break
            fi
            if [[ $attempt -eq 60 ]]; then
              echo "::error::api failed readiness within 120s"
              docker compose -f docker/docker-compose.infra.yml -f docker/docker-compose.yml \
                --env-file .env logs --tail=200 api web
              exit 1
            fi
            sleep 2
          done
          echo "::endgroup::"

          echo "::group::Wait for mcp readiness"
          for attempt in {1..60}; do
            if docker exec northstar-mcp curl -fsS http://localhost:8081/actuator/health >/dev/null 2>&1; then
              echo "mcp ready"; break
            fi
            if [[ $attempt -eq 60 ]]; then
              echo "::error::mcp failed readiness within 120s"
              docker compose -f docker/docker-compose.infra.yml -f docker/docker-compose.yml \
                --env-file .env logs --tail=200 mcp
              exit 1
            fi
            sleep 2
          done
          echo "::endgroup::"

          echo "::group::Wait for worker liveness"
          # No HTTP surface — healthy means the container's pgrep healthcheck
          # passes (start_period 60s, so give it a couple of minutes).
          for attempt in {1..60}; do
            state=$(docker inspect --format '{{.State.Health.Status}}' northstar-worker 2>/dev/null || echo missing)
            if [[ "$state" == "healthy" ]]; then echo "worker healthy"; break; fi
            if [[ $attempt -eq 60 ]]; then
              echo "::error::worker not healthy within 120s (state=$state)"
              docker compose -f docker/docker-compose.infra.yml -f docker/docker-compose.yml \
                --env-file .env logs --tail=100 worker
              exit 1
            fi
            sleep 2
          done
          echo "::endgroup::"

          echo "::group::Reload edge proxy (NPM pins upstream IPs at config load)"
          docker exec nginx-proxy-manager nginx -s reload \
            && echo "edge proxy reloaded" \
            || echo "::warning::NPM reload failed — /api may 502 until reloaded manually"
          echo "::endgroup::"

      - name: Post-deploy smoke check
        env:
          BASE_URL: ${{ vars.NORTHSTAR_BASE_URL }}
        run: |
          # Dual probe (zero-mail lesson): / proves TLS+web, and a real /api
          # endpoint proves the edge reaches the RECREATED api. Deliberately NOT
          # /api/actuator/health — actuator
          # is mapped at /actuator on the container, so through the edge's /api
          # route it 404s even when healthy; that path can't tell "healthy" from
          # "edge route broken". /api/disciplines/cards returns 200 when auth is
          # disabled, or 401 after the single-user login gate is enabled. Either
          # response proves the edge reached the recreated api instead of 502ing.
          smoke_ok() {
            local root api
            root=$(curl -o /dev/null -s -w '%{http_code}' "${BASE_URL}/" || echo 000)
            api=$(curl -o /dev/null -s -w '%{http_code}' "${BASE_URL}/api/disciplines/cards" || echo 000)
            echo "root=${root} api=${api}"
            [[ "$root" == "200" ]] && [[ "$api" == "200" || "$api" == "401" ]]
          }
          for attempt in {1..20}; do
            if smoke_ok; then echo "smoke OK"; exit 0; fi
            sleep 5
          done
          echo "::error::smoke check failed within 100s"
          exit 1

      - name: Roll back to previous images on failure
        if: failure()
        run: |
          set -uo pipefail
          cd /apps/north-star
          if [[ ! -s .last-deploy.txt ]]; then
            echo "::error::No previous-image snapshot — cannot auto-roll back."
            exit 1
          fi
          prev_api=$(awk '/^northstar-api /{print $2}' .last-deploy.txt)
          prev_web=$(awk '/^northstar-web /{print $2}' .last-deploy.txt)
          prev_worker=$(awk '/^northstar-worker /{print $2}' .last-deploy.txt)
          prev_mcp=$(awk '/^northstar-mcp /{print $2}' .last-deploy.txt)
          # Guard EACH request-path image individually: an empty var would resolve
          # to compose's :latest default, which does not exist on the box under
          # --no-build and fails the roll-back. api and web are both required.
          missing=()
          [[ -z "$prev_api" ]] && missing+=(api)
          [[ -z "$prev_web" ]] && missing+=(web)
          if (( ${#missing[@]} )); then
            echo "::error::Snapshot missing previous image(s): ${missing[*]} — manual intervention required."
            exit 1
          fi
          # Roll api+web back to their snapshots. The worker is additive (not on
          # the request path): recreate it only if we actually snapshotted it —
          # never invent a :main/:latest ref -- otherwise leave the new one in place.
          rollback_services="api web"
          export NORTHSTAR_API_IMAGE="$prev_api"
          export NORTHSTAR_WEB_IMAGE="$prev_web"
          if [[ -n "$prev_worker" ]]; then
            export NORTHSTAR_WORKER_IMAGE="$prev_worker"
            rollback_services="$rollback_services worker"
          fi
          if [[ -n "$prev_mcp" ]]; then
            export NORTHSTAR_MCP_IMAGE="$prev_mcp"
            rollback_services="$rollback_services mcp"
          fi
          echo "::warning::Deploy failed — rolling back (api=${prev_api} web=${prev_web} worker=${prev_worker:-keep-current} mcp=${prev_mcp:-keep-current})"
          docker compose -f docker/docker-compose.infra.yml -f docker/docker-compose.yml \
            --env-file .env up -d --no-build $rollback_services
          docker exec nginx-proxy-manager nginx -s reload >/dev/null 2>&1 || true
          for attempt in {1..60}; do
            if docker exec northstar-api curl -fsS http://localhost:8888/actuator/health >/dev/null 2>&1; then
              echo "rollback healthy — previous release restored (run stays RED on purpose)"
              exit 0
            fi
            [[ $attempt -eq 60 ]] && { echo "::error::rollback did not become ready — check DB state (partial migration?) and restore the pre-deploy pg_dump if needed"; exit 1; }
            sleep 2
          done
