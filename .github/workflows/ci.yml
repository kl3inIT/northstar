name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".agents/**"
      - ".claude/**"
      - ".codex/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".agents/**"
      - ".claude/**"
      - ".codex/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Gradle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v6.2.0
      - name: Build & test
        run: ./gradlew build --stacktrace

  web:
    name: Web (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Hey API output is gitignored — regenerate from the committed contract.
      - run: pnpm gen:api
      - run: pnpm test
      - run: pnpm build
