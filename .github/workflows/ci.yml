name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"
      - ".agents/**"
      - ".claude/**"
      - ".codex/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"
      - ".agents/**"
      - ".claude/**"
      - ".codex/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.scope.outputs.backend }}
      web: ${{ steps.scope.outputs.web }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Map changed files to CI areas
        id: scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail

          base="$BASE_SHA"
          head="$GITHUB_SHA"
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            base="$(git rev-list --max-parents=0 "$head")"
          fi

          mapfile -t changed < <(git diff --name-only "$base" "$head")
          backend=false
          web=false

          # A missing/empty diff is unusual; fail safe by exercising both areas.
          if (( ${#changed[@]} == 0 )); then
            backend=true
            web=true
          fi

          for path in "${changed[@]}"; do
            case "$path" in
              web/*|contracts/openapi.json|pnpm-workspace.yaml)
                web=true
                ;;
              apps/*|core/*|integrations/*|build-logic/*|gradle/*|build.gradle.kts|settings.gradle.kts|gradle.properties|gradlew|gradlew.bat)
                backend=true
                ;;
              docker/*|.github/workflows/ci.yml|.github/workflows/build-and-push.yml|.github/workflows/deploy.yml)
                backend=true
                web=true
                ;;
              mobile/*|.github/workflows/mobile-ci.yml|*.md|docs/*|.agents/*|.claude/*|.codex/*)
                ;;
              *)
                # Unknown files run both gates; speed must not weaken safety.
                backend=true
                web=true
                ;;
            esac
          done

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "web=$web" >> "$GITHUB_OUTPUT"
          printf 'backend=%s web=%s\n' "$backend" "$web" >> "$GITHUB_STEP_SUMMARY"

  backend:
    name: Backend (Gradle)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v6.2.0
      - name: Build & test
        run: ./gradlew build --stacktrace

  web:
    name: Web (Vite)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          # Keep CI deterministic: pnpm 11.12.0 currently crashes the action's
          # self-installer before any repository command runs.
          version: 11.9.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Hey API output is gitignored — regenerate from the committed contract.
      - run: pnpm gen:api
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps --only-shell chromium
      - name: Run critical browser regression
        run: pnpm test:e2e
      - name: Upload Playwright failure report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report
          path: output/playwright
          retention-days: 7

  gate:
    name: CI Gate
    if: always()
    needs: [changes, backend, web]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every selected area to pass
        shell: bash
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          WEB_RESULT: ${{ needs.web.result }}
        run: |
          set -euo pipefail
          [[ "$CHANGES_RESULT" == "success" ]]
          [[ "$BACKEND_RESULT" == "success" || "$BACKEND_RESULT" == "skipped" ]]
          [[ "$WEB_RESULT" == "success" || "$WEB_RESULT" == "skipped" ]]
