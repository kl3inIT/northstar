name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "apps/api/src/main/java/com/northstar/api/auth/**"
      - "apps/api/src/test/java/com/northstar/api/auth/**"
      - "apps/api/src/main/java/com/northstar/api/assistant/**"
      - "apps/api/src/test/java/com/northstar/api/assistant/**"
      - "core/src/main/resources/db/migration/*mobile_auth.sql"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    paths:
      - "mobile/**"
      - "apps/api/src/main/java/com/northstar/api/auth/**"
      - "apps/api/src/test/java/com/northstar/api/auth/**"
      - "apps/api/src/main/java/com/northstar/api/assistant/**"
      - "apps/api/src/test/java/com/northstar/api/assistant/**"
      - "core/src/main/resources/db/migration/*mobile_auth.sql"
      - ".github/workflows/mobile-ci.yml"
  workflow_dispatch:
    inputs:
      api_base_url:
        description: Public HTTPS API base URL embedded in sideload builds
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.44.6

jobs:
  quality-android:
    name: Quality, Web, Android
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-java@v5.6.0
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v6.2.0

      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v6.1.0
        with:
          path: ${{ runner.tool_cache }}/flutter/${{ env.FLUTTER_VERSION }}
          key: flutter-${{ runner.os }}-${{ runner.arch }}-${{ env.FLUTTER_VERSION }}

      - name: Install Flutter from the official repository
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        shell: bash
        working-directory: ${{ runner.temp }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TOOL_CACHE/flutter"
          git clone --depth 1 --branch "$FLUTTER_VERSION" \
            https://github.com/flutter/flutter.git \
            "$RUNNER_TOOL_CACHE/flutter/$FLUTTER_VERSION"

      - name: Configure Flutter
        shell: bash
        run: |
          echo "$RUNNER_TOOL_CACHE/flutter/$FLUTTER_VERSION/bin" >> "$GITHUB_PATH"
          "$RUNNER_TOOL_CACHE/flutter/$FLUTTER_VERSION/bin/flutter" config --no-analytics
          "$RUNNER_TOOL_CACHE/flutter/$FLUTTER_VERSION/bin/flutter" precache --web --android
          "$RUNNER_TOOL_CACHE/flutter/$FLUTTER_VERSION/bin/flutter" --version

      - name: Cache Dart packages
        uses: actions/cache@v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-${{ runner.arch }}-

      - name: Resolve dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test --no-pub

      - name: Build Web review
        run: flutter build web --release --no-pub --no-wasm-dry-run

      - name: Build Android debug APK
        run: flutter build apk --debug --no-pub

      - name: Upload Android APK
        uses: actions/upload-artifact@v7.0.1
        with:
          name: northstar-android-debug
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7

  ios:
    name: iOS (Sideloadly IPA)
    runs-on: macos-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: mobile
    env:
      MOBILE_API_BASE_URL: ${{ inputs.api_base_url || vars.NORTHSTAR_BASE_URL || 'http://localhost:8888' }}
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v6.1.0
        with:
          path: ${{ runner.tool_cache }}/flutter/${{ env.FLUTTER_VERSION }}
          key: flutter-${{ runner.os }}-${{ runner.arch }}-${{ env.FLUTTER_VERSION }}

      - name: Install Flutter from the official repository
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        shell: bash
        working-directory: ${{ runner.temp }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TOOL_CACHE/flutter"
          git clone --depth 1 --branch "$FLUTTER_VERSION" \
            https://github.com/flutter/flutter.git \
            "$RUNNER_TOOL_CACHE/flutter/$FLUTTER_VERSION"

      - name: Configure Flutter
        shell: bash
        run: |
          echo "$RUNNER_TOOL_CACHE/flutter/$FLUTTER_VERSION/bin" >> "$GITHUB_PATH"
          "$RUNNER_TOOL_CACHE/flutter/$FLUTTER_VERSION/bin/flutter" config --no-analytics
          "$RUNNER_TOOL_CACHE/flutter/$FLUTTER_VERSION/bin/flutter" precache --ios
          "$RUNNER_TOOL_CACHE/flutter/$FLUTTER_VERSION/bin/flutter" --version

      - name: Cache Dart packages
        uses: actions/cache@v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-${{ runner.arch }}-

      - name: Resolve dependencies
        run: flutter pub get

      - name: Validate embedded API URL
        shell: bash
        run: |
          set -euo pipefail
          case "$MOBILE_API_BASE_URL" in
            https://*|http://localhost:*|http://127.0.0.1:*) ;;
            *)
              echo "::error::Use HTTPS for a device build (local loopback is allowed only for compile review)."
              exit 1
              ;;
          esac
          echo "Embedding API base URL: $MOBILE_API_BASE_URL"

      - name: Build unsigned iOS app
        run: >-
          flutter build ios --release --no-codesign --no-pub
          --build-number="${{ github.run_number }}"
          --dart-define="NORTHSTAR_API_BASE_URL=$MOBILE_API_BASE_URL"

      - name: Package and verify Sideloadly IPA
        shell: bash
        run: |
          set -euo pipefail
          app="$PWD/build/ios/iphoneos/Runner.app"
          output="$PWD/build/ios/northstar-sideloadly.ipa"
          staging="$RUNNER_TEMP/northstar-sideloadly"

          test -d "$app"
          rm -rf "$staging"
          mkdir -p "$staging/Payload"
          /usr/bin/ditto "$app" "$staging/Payload/Runner.app"
          (
            cd "$staging"
            /usr/bin/ditto -c -k --sequesterRsrc --keepParent Payload "$output"
          )

          /usr/bin/unzip -tq "$output"
          /usr/bin/unzip -l "$output" | grep -q 'Payload/Runner.app/Info.plist'
          /usr/bin/shasum -a 256 "$output" > "$output.sha256"

          bundle_id=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' \
            "$staging/Payload/Runner.app/Info.plist")
          if [[ "$bundle_id" != "io.github.kl3init.northstar" ]]; then
            echo "::error::Unexpected bundle ID: $bundle_id"
            exit 1
          fi
          echo "Sideloadly IPA verified for $bundle_id" >> "$GITHUB_STEP_SUMMARY"
          echo "API base URL: $MOBILE_API_BASE_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Sideloadly IPA
        uses: actions/upload-artifact@v7.0.1
        with:
          name: northstar-ios-sideloadly
          path: |
            mobile/build/ios/northstar-sideloadly.ipa
            mobile/build/ios/northstar-sideloadly.ipa.sha256
          if-no-files-found: error
          retention-days: 7
