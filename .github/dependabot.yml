version: 2
updates:
  # Backend — Gradle multi-module (reads gradle/libs.versions.toml too)
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      spring:
        patterns:
          - "org.springframework*"
          - "io.spring*"
      test:
        patterns:
          - "org.junit*"
          - "org.testcontainers*"

  # Frontend — web (npm/pnpm)
  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      tanstack:
        patterns:
          - "@tanstack/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"

  # CI workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Container images in compose.yaml
  - package-ecosystem: docker-compose
    directory: "/"
    schedule:
      interval: weekly
